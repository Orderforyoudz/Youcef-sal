<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>السعر النهائي للمنتج</title>
<style>
body { font-family: Arial; direction: rtl; display:flex; justify-content:center; align-items:center; height:100vh; background:#f5f5f5; margin:0;}
.calculator { background:#fff; padding:30px; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,0.2); width:350px; text-align:center;}
.calculator h2 { margin-bottom:20px; color:#2c3e50;}
input { width:100%; padding:12px; margin:10px 0; border-radius:8px; border:1px solid #ccc; font-size:16px;}
.result { margin-top:20px; font-size:22px; font-weight:bold; color:#27ae60;}
</style>
</head>
<body>
<div class="calculator">
<h2>السعر النهائي للمنتج</h2>
<input type="number" id="usdPrice" placeholder="أدخل السعر بالدولار" oninput="calculateFinal()">
<div class="result" id="result"></div>
</div>

<script>
const exchangeRate = 250; // سعر الدولار بالدينار الجزائري
const commissionRate = 10; // العمولة 10%

function calculateFinal() {
    const usd = parseFloat(document.getElementById("usdPrice").value);
    if (isNaN(usd)) {
        document.getElementById("result").innerHTML = "أدخل السعر بالدولار";
        return;
    }

    const priceDZD = usd * exchangeRate;
    const total = priceDZD * (1 + commissionRate/100);
    document.getElementById("result").innerHTML = `السعر النهائي: ${total.toLocaleString()} دج`;
}
</script>
</body>
</html>
